name: Switch Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the production environment"
        required: true
        type: choice
        options:
          - blue
          - green
        default: blue

jobs:
  switch:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Select Target Group
        id: tg
        run: |
          if [ "${{ github.event.inputs.environment }}" = "blue" ]; then
            echo "TARGET_GROUP_ARN=${{ secrets.BLUE_TARGET_GROUP_ARN }}" >> $GITHUB_ENV
          else
            echo "TARGET_GROUP_ARN=${{ secrets.GREEN_TARGET_GROUP_ARN }}" >> $GITHUB_ENV
          fi

      - name: Switch ALB Production Target Group
        run: |
          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.ALB_LISTENER_ARN }}" \
            --default-actions Type=forward,TargetGroupArn="$TARGET_GROUP_ARN"

      - name: Verify Listener
        run: |
          aws elbv2 describe-listeners \
            --listener-arns "${{ secrets.ALB_LISTENER_ARN }}"