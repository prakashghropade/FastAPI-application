name: Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker Image Tag
        required: true
        type: string
        default: latest

      deploy_to:
        description: Deploy Environment
        required: true
        type: choice
        options:
          - blue
          - green
        default: blue

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_IMAGE_NAME }}:${{ inputs.image_tag }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:${{ inputs.image_tag }}

  deploy-blue:
    needs: build
    if: inputs.deploy_to == 'blue'
    uses: ./.github/workflows/deploy-blue.yml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit

  deploy-green:
    needs: build
    if: inputs.deploy_to == 'green'
    uses: ./.github/workflows/deploy-green.yml
    with:
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit