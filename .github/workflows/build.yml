name: Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker Image Tag
        required: true
        type: string
        default: latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_IMAGE_NAME }}:${{ inputs.image_tag }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:${{ inputs.image_tag }}

